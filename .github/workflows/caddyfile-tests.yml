name: caddyfile tests 

on:
  push:
    paths:
      - "caddyfile.go"
      - "caddyfile_test.go"
      - ".github/workflows/caddyfile-tests.yml"
  pull_request:
    paths:
      - "caddyfile.go"
      - "caddyfile_test.go"
      - ".github/workflows/caddyfile-tests.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23.x"

      - name: Bootstrap module and run tests
        run: |
          if [ ! -f go.mod ]; then
            go mod init example.com/caddy-bunnynet-ip-ci
          fi
          go mod tidy
          go test -v -count=1 ./...
